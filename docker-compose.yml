name: planglade

services:
  migrate:
    build:
      context: .
      target: migrator
    env_file: .env
    environment:
      DATABASE_URL: file:/app/db/planglade.db
    volumes:
      - planglade_data:/app/db
    restart: "no"

  app:
    build:
      context: .
      target: runner
    env_file: .env
    environment:
      DATABASE_URL: file:/app/db/planglade.db
      PLANGLADE_AUTH_MODE: nextauth
      NEXT_PUBLIC_PLANGLADE_AUTH_MODE: nextauth
      # Docker default stores attachments on a local, persistent Docker volume.
      # Set PLANGLADE_STORAGE_PROVIDER=firebase in .env (and provide Firebase
      # credentials) only if you intentionally want hosted Firebase Storage.
      PLANGLADE_STORAGE_PROVIDER: ${PLANGLADE_STORAGE_PROVIDER:-local}
      PLANGLADE_LOCAL_STORAGE_DIR: /app/storage/local-attachments
      PLANGLADE_STORAGE_SIGNING_SECRET: ${PLANGLADE_STORAGE_SIGNING_SECRET:-${NEXTAUTH_SECRET}}
      PLANGLADE_EMAIL_PROVIDER: ${PLANGLADE_EMAIL_PROVIDER:-disabled}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "${PLANGLADE_PORT:-3000}:3000"
    volumes:
      - planglade_data:/app/db
      - planglade_attachments:/app/storage/local-attachments
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(async response => { const body = await response.json(); process.exit(response.ok && body.status === 'ok' ? 0 : 1) }).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  planglade_data:
  planglade_attachments:
