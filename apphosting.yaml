# Firebase App Hosting runtime settings.
#
# This file is a placeholder for future Firebase App Hosting use. It is not a
# final generic self-hosting guide. Replace all placeholder values in your
# hosting environment before deploying.
runConfig:
  minInstances: 0
  maxInstances: 3
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  # Example auth/storage mode for Firebase App Hosting.
  - variable: FLOWBOARD_AUTH_MODE
    value: firebase
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FLOWBOARD_AUTH_MODE
    value: firebase
    availability:
      - BUILD
      - RUNTIME

  - variable: FLOWBOARD_STORAGE_PROVIDER
    value: firebase
    availability:
      - BUILD
      - RUNTIME

  # Public Firebase web config placeholders.
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: replace-with-public-firebase-api-key
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: your-project.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: your-project-id
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: your-project.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "replace-with-messaging-sender-id"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: replace-with-firebase-app-id
    availability:
      - BUILD
      - RUNTIME

  # Server-side Firebase Admin configuration placeholders.
  - variable: FIREBASE_PROJECT_ID
    value: your-project-id
    availability:
      - BUILD
      - RUNTIME

  - variable: FIREBASE_STORAGE_BUCKET
    value: your-project.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
