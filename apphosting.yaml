# Firebase App Hosting runtime settings
runConfig:
  minInstances: 0
  maxInstances: 3
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  # Auth mode: keep production on Firebase only.
  - variable: FLOWBOARD_AUTH_MODE
    value: firebase
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FLOWBOARD_AUTH_MODE
    value: firebase
    availability:
      - BUILD
      - RUNTIME

  - variable: FLOWBOARD_STORAGE_PROVIDER
    value: firebase
    availability:
      - BUILD
      - RUNTIME

  # Public Firebase web config
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyCpP_sRO0bWxrZgX1muII8moAJn019LMZw
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: projectmanagement-e613c.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: projectmanagement-e613c
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: projectmanagement-e613c.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "503070301802"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:503070301802:web:e7ed8b5603d1fc45e43413
    availability:
      - BUILD
      - RUNTIME

  # Server-side Firebase Admin configuration
  - variable: FIREBASE_PROJECT_ID
    value: projectmanagement-e613c
    availability:
      - BUILD
      - RUNTIME

  - variable: FIREBASE_STORAGE_BUCKET
    value: projectmanagement-e613c.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
