name: Bug report
description: Report something that is broken or confusing.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not paste secrets, tokens, database URLs, private keys, or private workspace data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps someone else can follow.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: browser_device
    attributes:
      label: Browser / device
      description: Browser, OS, device, and screen size if relevant.
      placeholder: "Chrome on Windows 11, desktop"
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Self-host / local version
      description: Commit SHA, branch, release, or note if running from a local checkout.
      placeholder: "main at abc1234, or local dev checkout"
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Optional. Remove private data before sharing.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Optional. Remove secrets, tokens, database URLs, and private data before sharing.
    validations:
      required: false
