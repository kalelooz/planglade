name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "codex/**"

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: file:../db/ci.db

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enforce README freshness
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "README_BASE_REF=origin/${{ github.base_ref }}" >> $GITHUB_ENV
          else
            echo "README_BASE_REF=${{ github.event.before }}" >> $GITHUB_ENV
          fi
          echo "README_HEAD_REF=${{ github.sha }}" >> $GITHUB_ENV
          npm run check:readme-sync

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Lint + Typecheck
        run: npm run ci:check

      - name: Run unit tests
        run: npm run test

      - name: Security audit (critical)
        run: npm audit --omit=dev --audit-level=critical
