name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "codex/**"

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: file:../db/ci.db

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enforce README freshness
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "README_BASE_REF=origin/${{ github.base_ref }}" >> $GITHUB_ENV
          else
            echo "README_BASE_REF=${{ github.event.before }}" >> $GITHUB_ENV
          fi
          echo "README_HEAD_REF=${{ github.sha }}" >> $GITHUB_ENV
          npm run check:readme-sync

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Lint + Typecheck
        run: npm run ci:check

      - name: Run unit tests
        run: npm run test

      - name: Security audit (high)
        run: npm audit --omit=dev --audit-level=high

  browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: file:../test-results/browser-smoke.db
      PLANGLADE_AUTH_MODE: nextauth
      NEXT_PUBLIC_PLANGLADE_AUTH_MODE: nextauth
      NEXTAUTH_SECRET: browser-smoke-only-secret-not-for-production
      NEXTAUTH_URL: http://127.0.0.1:3100
      PLANGLADE_STORAGE_PROVIDER: local
      PLANGLADE_STORAGE_SIGNING_SECRET: browser-smoke-storage-secret-not-for-production
      PLANGLADE_LOCAL_STORAGE_DIR: test-results/browser-smoke-attachments
      PLANGLADE_EMAIL_PROVIDER: disabled

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: npm run test:browser

      - name: Upload browser failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

      - name: Production build (public self-host configuration)
        env:
          PLANGLADE_AUTH_MODE: nextauth
          NEXT_PUBLIC_PLANGLADE_AUTH_MODE: nextauth
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-only-nextauth-secret-not-for-deployment
          PLANGLADE_STORAGE_PROVIDER: local
          PLANGLADE_STORAGE_SIGNING_SECRET: ci-only-storage-signing-secret-not-for-deployment
          PLANGLADE_LOCAL_STORAGE_DIR: ${{ runner.temp }}/planglade-local-attachments
          PLANGLADE_EMAIL_PROVIDER: disabled
        run: npm run build
